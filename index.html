<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0e0e10; color: #e8e6e0; min-height: 100vh; }
    #root { min-height: 100vh; }

    @media (max-width: 640px) {
      /* Sidebar diventa barra in basso */
      aside {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        height: auto !important;
        flex-direction: row !important;
        padding: 0 !important;
        border-right: none !important;
        border-top: 1px solid #1e1e23 !important;
        z-index: 50;
        justify-content: space-around;
        align-items: center;
      }
      /* Nascondi elementi sidebar non necessari su mobile */
      aside .brand,
      aside .navLabel,
      aside .profileSub,
      aside .count { display: none !important; }

      /* Nav orizzontale */
      aside nav {
        flex-direction: row !important;
        gap: 0 !important;
        flex: 1;
        justify-content: space-around;
      }
      aside nav button {
        flex-direction: column !important;
        padding: 10px 6px !important;
        font-size: 10px !important;
        gap: 2px;
        border-radius: 0 !important;
        justify-content: center !important;
        width: auto !important;
      }
      /* Bottone admin e profilo in basso */
      aside > div,
      aside > button {
        padding: 10px 8px !important;
        border: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
        font-size: 10px !important;
        flex-direction: column !important;
        gap: 2px !important;
        align-items: center !important;
        width: auto !important;
        min-width: 56px;
        justify-content: center;
      }
      /* Main con padding bottom per non finire sotto la barra */
      main {
        padding: 1rem !important;
        padding-bottom: 80px !important;
        width: 100%;
      }
      /* Grid a colonna singola */
      .grid, [style*="auto-fill"] {
        grid-template-columns: 1fr !important;
      }
      /* Heading più piccolo */
      h1 { font-size: 18px !important; }
      /* Bottone upload */
      [style*="Carica file"] { padding: 8px 12px !important; font-size: 13px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
